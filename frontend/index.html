<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ATS Resume Checker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>🚀 ATS Resume Checker</h1>

    <input type="file" id="resume" accept=".pdf">
    <textarea id="jd" placeholder="Paste Job Description here..."></textarea>

    <button onclick="analyze()">Analyze Resume</button>

    <div id="result" class="hidden">
      <h2>ATS Score: <span id="score"></span>%</h2>
      <div class="progress">
        <div id="progress-bar"></div>
      </div>

      <h3>Missing Keywords:</h3>
      <ul id="keywords"></ul>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
