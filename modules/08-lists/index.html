<!DOCTYPE html>
<html>
<head>
<title>HTML Lists</title>
</head>

<body>

<h1>HTML List Examples</h1>

<h2>Unordered List</h2>

<ul>
<li>HTML</li>
<li>CSS</li>
<li>JavaScript</li>
</ul>

<h2>Ordered List</h2>

<ol>
<li>Install editor</li>
<li>Write HTML code</li>
<li>Open in browser</li>
</ol>

<h2>Nested List</h2>

<ul>
<li>Frontend
    <ul>
        <li>HTML</li>
        <li>CSS</li>
    </ul>
</li>
<li>Backend</li>
</ul>

</body>
</html>
